# .github/workflows/deploy.yml

name: Deploy VitePress site to GitHub Pages

on:
  push:
    branches:
      - main  # Or your default branch (e.g., master)

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write # Required for OIDC deployment

    env:
      # These will match your VitePress config's `base` option
      # If your repo is 'username.github.io', set this to '/'
      # If your repo is 'MyUsername/my-vitepress-site', set this to '/my-vitepress-site/'
      BASE_URL: /{{ test-digital-buch }}/ # Replace {{ YOUR_REPO_NAME }} with your actual repository name

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history to get all tags for previous versions if needed

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20 # Use a recent LTS Node.js version

      - name: Install Dependencies
        run: npm install --frozen-lockfile # or yarn install --frozen-lockfile, pnpm install --frozen-lockfile

      - name: Build VitePress site
        run: npm run build # or yarn build, pnpm build
        env:
          NODE_ENV: production
          VITEPRESS_BASE: ${{ env.BASE_URL }} # Pass the base URL to VitePress build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist # The folder generated by `vitepress build`

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4